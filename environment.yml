# conda environent needed to run most of the scripts in this folder.
# To install, type :
# conda env create -f environment.yml

name: macwaves
channels:
  - conda-forge
dependencies:
  - jupyter
  - numpy
  - scipy
  - matplotlib
  - finitediff
  - pyshtools
  - pandas
  - xarray
  - netcdf4
  - pip
  - pip:
    - finitediff
